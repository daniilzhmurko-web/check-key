<!DOCTYPE html>
<html lang="ru" data-artifact-state="done">
<head><script>
(function() {
  try {
    var t = localStorage.getItem('pz_platform_theme');
    if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
})();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Платформа контроля ПЗ | Преподаватель</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00D4FF;
    --primary-glow: rgba(0,212,255,0.25);
    --accent: #7C3AED;
    --accent-glow: rgba(124,58,237,0.25);
    --bg: #0A0E1A;
    --surface: rgba(255,255,255,0.045);
    --surface-solid: #0d1424;
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.1);
    --border-glow: rgba(0,212,255,0.3);
    --ink: #E2E8F0;
    --ink-muted: rgba(226,232,240,0.55);
    --ink-strong: #ffffff;
    --success: #00FFB3;
    --warn: #FFD700;
    --danger: #FF6B6B;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --shadow-card: 0 8px 32px rgba(0,212,255,.12), 0 2px 8px rgba(124,58,237,.10);
    --shadow-modal: 0 24px 64px rgba(0,212,255,.20), 0 8px 24px rgba(124,58,237,.18);
    --font: 'Inter', sans-serif;
  }

  /* ══ СВЕТЛАЯ ТЕМА ══ */
  [data-theme="light"] {
    --bg: #F1F4F9;
    --surface: rgba(20,30,55,0.04);
    --surface-solid: #EEF1F7;
    --surface-hover: rgba(20,30,55,0.075);
    --border: rgba(20,30,55,0.13);
    --border-glow: rgba(0,144,216,0.35);
    --ink: #1E2436;
    --ink-muted: rgba(30,36,54,0.62);
    --ink-strong: #0B1220;
    --shadow-card: 0 8px 28px rgba(30,41,59,.08), 0 2px 8px rgba(30,41,59,.05);
    --shadow-modal: 0 24px 60px rgba(30,41,59,.14), 0 8px 24px rgba(30,41,59,.10);
  }
  [data-theme="light"] .blob { opacity: 0.10; }
  [data-theme="light"] body { background: var(--bg); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    
    overflow-x: hidden;
    position: relative;
  }

  /* ── BLOB BACKGROUND ── */
  .blob-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: blobFloat linear infinite;
  }
  .blob-1 { width: 520px; height: 520px; background: radial-gradient(circle, #00D4FF 0%, #0066FF 60%, transparent 100%); top: -120px; left: -80px; animation-duration: 18s; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #7C3AED 0%, #4F1DB5 60%, transparent 100%); top: 30%; right: -100px; animation-duration: 22s; animation-delay: -6s; }
  .blob-3 { width: 350px; height: 350px; background: radial-gradient(circle, #00FFB3 0%, #00A88F 60%, transparent 100%); bottom: 10%; left: 20%; animation-duration: 26s; animation-delay: -12s; }
  .blob-4 { width: 280px; height: 280px; background: radial-gradient(circle, #FF6B9D 0%, #C91B6E 60%, transparent 100%); bottom: 30%; right: 25%; animation-duration: 20s; animation-delay: -4s; }
  .blob-5 { width: 200px; height: 200px; background: radial-gradient(circle, #FFD700 0%, #FF8C00 60%, transparent 100%); top: 55%; left: 5%; animation-duration: 16s; animation-delay: -9s; }
  @keyframes blobFloat {
    0%   { transform: translate(0,0) scale(1); }
    25%  { transform: translate(30px,-40px) scale(1.05); }
    50%  { transform: translate(-20px,30px) scale(0.97); }
    75%  { transform: translate(40px,20px) scale(1.03); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* Grid noise overlay */
  .grid-noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── LAYOUT ── */
  .page-wrap {
    position: relative; z-index: 1;
    max-width: 1020px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── HEADER ── */
  .page-header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp .7s ease both;
  }
  .header-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 9999px;
    padding: 6px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 20px;
  }
  .header-badge svg { width:14px; height:14px; flex-shrink:0; }
  .page-title {
    font-size: clamp(2rem, 4vw, 3.4rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #00D4FF 50%, #7C3AED 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .page-sub {
    color: var(--ink-muted);
    font-size: 16px;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── GLASS CARD ── */
  .glass-card {
    background: var(--surface);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 32px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
    margin-bottom: 28px;
    animation: fadeUp .7s ease both;
  }
  .glass-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .glass-card:nth-child(2) { animation-delay: .1s; }
  .glass-card:nth-child(3) { animation-delay: .2s; }

  /* ── DOODLE DECORATIONS ── */
  .doodle {
    position: absolute;
    opacity: 0.07;
    pointer-events: none;
  }
  .doodle-tl { top: 16px; left: 16px; }
  .doodle-tr { top: 16px; right: 16px; }
  .doodle-br { bottom: 16px; right: 16px; }

  /* ── CARD HEADER ── */
  .card-heading {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .card-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px var(--primary-glow);
    flex-shrink: 0;
  }
  .card-icon svg { width:22px; height:22px; color: var(--ink-strong); }
  .card-heading h2, .card-heading h3 {
    font-size: 20px; font-weight: 700; color: var(--ink-strong);
  }
  .card-heading p { font-size: 13px; color: var(--ink-muted); margin-top: 2px; }

  /* ── FORM GRID ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }

  /* ── FIELD ── */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--ink-muted);
  }
  .field-hint { font-size: 11px; color: rgba(226,232,240,0.35); margin-top: 4px; }
  .field-hint.warn { color: rgba(255,107,107,0.8); }

  /* Drag-and-drop зона пакетной загрузки */
  #batchDropZone { transition: background .2s, border-color .2s, box-shadow .2s; border-radius: var(--radius-md); }
  #batchDropZone.dropzone-active {
    background: rgba(0,255,179,0.06);
    box-shadow: 0 0 0 2px rgba(0,255,179,0.4) inset, 0 0 24px rgba(0,255,179,0.15);
  }

  /* Панель фильтров пакетного дашборда */
  .filters-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 24px;
  }
  .filters-bar input, .filters-bar select {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--ink);
    padding: 8px 12px; border-radius: 8px; font-family: var(--font); font-size: 13px; outline: none;
  }
  .filters-bar input:focus, .filters-bar select:focus { border-color: var(--primary); }
  .filters-bar input[type="text"] { min-width: 180px; }

  input[type="text"], input[type="password"], input[type="number"], textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    color: var(--ink);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
    resize: vertical;
  }
  input:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
    background: rgba(0,212,255,0.06);
  }
  input::placeholder, textarea::placeholder { color: rgba(226,232,240,0.25); }

  /* number input: hide spinners */
  input[type=number]::-webkit-inner-spin-button { opacity: .4; }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-top: 28px;
  }
  .btn {
    position: relative; overflow: hidden;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px;
    border: none; border-radius: var(--radius-md);
    font-family: var(--font); font-size: 14px; font-weight: 700;
    letter-spacing: .02em;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, filter .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg { width:18px; height:18px; flex-shrink:0; }

  /* Ripple */
  .ripple-effect {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: rippleAnim .6s linear;
    background: rgba(255,255,255,0.35);
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  .btn-primary-neo {
    background: linear-gradient(135deg, #00D4FF 0%, #0099CC 100%);
    color: #0A0E1A;
    box-shadow: 0 4px 20px rgba(0,212,255,0.45);
  }
  .btn-primary-neo:hover { filter: brightness(1.1); box-shadow: 0 6px 28px rgba(0,212,255,0.6); }

  .btn-success-neo {
    background: linear-gradient(135deg, #00FFB3 0%, #00A88F 100%);
    color: #0A0E1A;
    box-shadow: 0 4px 16px rgba(0,255,179,0.35);
  }
  .btn-success-neo:hover { filter: brightness(1.08); }

  .btn-accent-neo {
    background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%);
    color: var(--ink-strong);
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  }
  .btn-accent-neo:hover { filter: brightness(1.1); }

  /* Pulse on primary btn */
  .btn-pulse::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: calc(var(--radius-md) + 3px);
    border: 2px solid var(--primary);
    opacity: 0;
    animation: btnPulse 2s infinite;
  }
  @keyframes btnPulse {
    0%   { opacity: .7; transform: scale(1); }
    70%  { opacity: 0; transform: scale(1.12); }
    100% { opacity: 0; }
  }

  /* ── RESULT CARD ── */
  #resultCard { display: none; }
  #resultCard.visible {
    display: block;
    animation: fadeUp .6s ease both;
  }

  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    margin-bottom: 24px;
  }
  .count-pill {
    background: linear-gradient(135deg, rgba(0,212,255,0.2) 0%, rgba(124,58,237,0.2) 100%);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 9999px;
    padding: 4px 14px;
    font-size: 13px; font-weight: 700; color: var(--primary);
  }

  .result-meta {
    font-size: 13px; color: var(--ink-muted); margin-bottom: 20px;
    padding: 12px 16px;
    background: rgba(0,212,255,0.05);
    border-left: 3px solid var(--primary);
    border-radius: 0 8px 8px 0;
  }

  /* ── TABLE ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: rgba(0,212,255,0.08);
    color: var(--primary);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid rgba(0,212,255,0.15);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .2s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.row-in {
    animation: rowSlideIn .35s ease both;
  }
  @keyframes rowSlideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  tbody tr:hover td { background: rgba(0,212,255,0.04); }
  td {
    padding: 14px 16px;
    color: var(--ink);
    vertical-align: middle;
  }
  td:first-child {
    color: var(--ink-muted); font-size: 12px; font-weight: 600;
  }

  .token-cell {
    font-family: 'SFMono-Regular', 'Consolas', monospace;
    font-size: 10px;
    color: rgba(0,212,255,0.85);
    word-break: break-all;
    max-width: 320px;
    line-height: 1.5;
    position: relative;
  }
  .token-shimmer {
    background: linear-gradient(90deg,
      rgba(0,212,255,0.5) 0%,
      rgba(124,58,237,0.5) 50%,
      rgba(0,212,255,0.5) 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }

  .badge-grp {
    display: inline-flex; align-items: center;
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.25);
    color: var(--primary);
    border-radius: 9999px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 600;
  }

  .exp-text { font-size: 12px; color: rgba(0,255,179,0.8); font-weight: 500; }

  .copy-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 10px;
    color: var(--primary);
    cursor: pointer;
    transition: background .2s, transform .15s;
    overflow: hidden; position: relative;
  }
  .copy-btn:hover { background: rgba(0,212,255,0.2); transform: scale(1.08); }
  .copy-btn:active { transform: scale(0.93); }
  .copy-btn svg { width:16px; height:16px; }
  .copy-btn.copied { background: rgba(0,255,179,0.15); border-color: rgba(0,255,179,0.35); color: #00FFB3; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spinOnce {
    to { transform: rotate(360deg); }
  }

  /* ── COUNTER BADGE ── */
  .stat-strip {
    display: flex; gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1; min-width: 100px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-val { font-size: 28px; font-weight: 800; color: var(--primary); line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .06em; }

  /* ── FLOATING PARTICLES ── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; width: 2px; height: 2px;
    border-radius: 50%; background: var(--primary);
    animation: particleDrift linear infinite;
    opacity: 0;
  }
  @keyframes particleDrift {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: .6; }
    90%  { opacity: .3; }
    100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
  }

  /* Loading spinner */
  .spin-icon { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* WOW: stagger for counter */
  .count-up { animation: countUp .5s ease both; }
  @keyframes countUp {
    from { transform: scale(0.5) translateY(10px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius: 99px; }

  /* ══════════════════════════════════════════════
     ── ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ (ДЕНЬ/НОЧЬ) ──
     ══════════════════════════════════════════════ */
  .theme-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 999;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink);
    transition: background .2s, transform .15s, box-shadow .2s, border-color .2s;
    box-shadow: var(--shadow-card);
  }
  .theme-toggle:hover { background: var(--surface-hover); transform: scale(1.08) rotate(-8deg); border-color: var(--border-glow); }
  .theme-toggle:active { transform: scale(0.94); }
  .theme-toggle svg { width: 21px; height: 21px; }
  @media (max-width: 640px) { .theme-toggle { top: 12px; right: 12px; width: 40px; height: 40px; } }

  /* ══════════════════════════════════════════════
     ── TAB NAVIGATION ──
     ══════════════════════════════════════════════ */
  .tab-nav {
    display: flex; justify-content: center; gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 36px;
    animation: fadeUp .7s ease both .05s;
  }
  .tab-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 26px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 9999px;
    color: var(--ink-muted);
    font-family: var(--font);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s, box-shadow .2s, transform .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .tab-btn:hover { background: rgba(255,255,255,0.08); color: var(--ink); }
  .tab-btn:active { transform: scale(0.97); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: var(--ink-strong);
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(0,212,255,0.35);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeUp .5s ease both; }

  /* ══════════════════════════════════════════════
     ── VERIFICATION PANEL ──
     ══════════════════════════════════════════════ */
  .glass-card h3 {
    font-size: 18px; font-weight: 700; color: var(--ink-strong);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .glass-card h4 { font-size: 14px; font-weight: 700; color: var(--ink); margin: 18px 0 10px; }
  .glass-card p { color: var(--ink-muted); font-size: 13.5px; line-height: 1.6; }
  .glass-card b { color: var(--ink-strong); }

  .red { color: var(--danger); font-weight: 700; }
  .green { color: var(--success); font-weight: 700; }
  .orange { color: var(--warn); font-weight: 700; }
  .blue { color: var(--primary); font-weight: 700; }

  .risk-banner {
    padding: 16px 22px;
    border-radius: var(--radius-md);
    margin-bottom: 28px;
    font-weight: 700;
    font-size: 1.05em;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid;
    animation: fadeUp .5s ease both;
  }
  .risk-low  { background: rgba(0,255,179,0.08);  border-color: rgba(0,255,179,0.3);  color: var(--success); }
  .risk-med  { background: rgba(255,215,0,0.08);   border-color: rgba(255,215,0,0.3);  color: var(--warn); }
  .risk-high { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.35); color: var(--danger); }

  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 12px;
    border-radius: 9999px;
    font-size: 11px; font-weight: 700; letter-spacing: .02em;
    white-space: nowrap;
  }
  .badge-danger { background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.35); color: var(--danger); }
  .badge-warn   { background: rgba(255,215,0,0.12);   border: 1px solid rgba(255,215,0,0.3);   color: var(--warn); }
  .badge-ok     { background: rgba(0,255,179,0.12);   border: 1px solid rgba(0,255,179,0.3);   color: var(--success); }
  .badge-info   { background: rgba(0,212,255,0.12);   border: 1px solid rgba(0,212,255,0.3);   color: var(--primary); }

  .score-ring {
    width: 112px; height: 112px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    margin: 0 auto 16px;
    border: 3px solid var(--primary);
    background: radial-gradient(circle, rgba(0,212,255,0.12), rgba(124,58,237,0.08));
    box-shadow: 0 0 0 8px rgba(0,212,255,0.08), 0 4px 24px rgba(0,212,255,0.2);
  }
  .score-val { font-size: 2em; font-weight: 900; color: var(--ink-strong); line-height: 1; }
  .score-max { font-size: .7em; color: var(--ink-muted); }

  .grade-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 9999px;
    font-weight: 800;
    font-size: .9em;
    letter-spacing: .03em;
  }
  .grade-5 { background: rgba(0,255,179,0.15);   color: var(--success); border: 1px solid rgba(0,255,179,0.35); }
  .grade-4 { background: rgba(0,212,255,0.15);   color: var(--primary); border: 1px solid rgba(0,212,255,0.35); }
  .grade-3 { background: rgba(255,215,0,0.15);   color: var(--warn);    border: 1px solid rgba(255,215,0,0.35); }
  .grade-2 { background: rgba(255,107,107,0.15); color: var(--danger);  border: 1px solid rgba(255,107,107,0.35); }

  .empty-state { text-align: center; color: var(--ink-muted); padding: 20px; }

  .formula-tag {
    display: inline-block;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: .8em;
    font-weight: 700;
    margin-left: 6px;
  }

  .hl-paste {
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    color: var(--warn);
    padding: 2px 8px;
    border-radius: 6px;
  }

  .hash-mono {
    font-family: 'SFMono-Regular', 'Consolas', monospace;
    font-size: 11px;
    color: rgba(0,212,255,0.75);
    word-break: break-all;
  }

  .code-log {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px;
    color: rgba(0,255,179,0.85);
    font-family: 'SFMono-Regular', 'Consolas', monospace;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
    line-height: 1.6;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: center; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

  /* generic th used for label cells inside two-column summary tables */
  th {
    padding: 14px 16px;
    text-align: left;
    vertical-align: middle;
    font-weight: 700;
    font-size: 12px;
    color: var(--ink-muted);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
