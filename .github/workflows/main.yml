<script>
/* ── PARTICLES ── */
(function spawnParticles() {
  const container = document.getElementById('particles');
  const colors = ['#00D4FF', '#7C3AED', '#00FFB3', '#FFD700'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${8 + Math.random() * 16}s;
      animation-delay: ${-Math.random() * 20}s;
    `;
    container.appendChild(p);
  }
})();

/* ── RIPPLE ── */
function addRipple(btn, e) {
  const r = document.createElement('span');
  r.className = 'ripple-effect';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  const x = (e.clientX - rect.left) - size / 2;
  const y = (e.clientY - rect.top) - size / 2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
}
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => addRipple(btn, e));
});

/* ── ТЕМА (ДЕНЬ/НОЧЬ) ── */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const moon = document.getElementById('themeIconMoon');
  const sun = document.getElementById('themeIconSun');
  if (moon && sun) {
    moon.style.display = theme === 'light' ? 'none' : 'block';
    sun.style.display = theme === 'light' ? 'block' : 'none';
  }
  try { localStorage.setItem('pz_platform_theme', theme); } catch (e) {}
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(current === 'light' ? 'dark' : 'light');
}
/* Синхронизируем иконку кнопки с темой, применённой ещё в <head> (до отрисовки) */
applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark');

/* ── TABS ── */
function switchTab(panelId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
  document.getElementById(panelId).classList.add('active');
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── CRYPTO UTILS ── */
let allTokens = [];

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

function arrayBufferToBase64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function importSigningPrivateKey(jwkStr) {
  const jwk = JSON.parse(jwkStr);
  return crypto.subtle.importKey('jwk', jwk, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['sign']);
}

async function signPayload(privateKey, dataStr) {
  const sigBuf = await crypto.subtle.sign(
    { name: 'ECDSA', hash: { name: 'SHA-256' } },
    privateKey,
    new TextEncoder().encode(dataStr)
  );
  return arrayBufferToBase64(sigBuf);
}

/* ── ГЕНЕРАЦИЯ ПАРЫ КЛЮЧЕЙ (один раз на курс/семестр) ── */
async function generateSigningKeyPair(btn) {
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Генерация ключей…';
  try {
    const kp = await crypto.subtle.generateKey({ name: 'ECDSA', namedCurve: 'P-256' }, true, ['sign', 'verify']);
    const priv = await crypto.subtle.exportKey('jwk', kp.privateKey);
    const pub  = await crypto.subtle.exportKey('jwk', kp.publicKey);
    document.getElementById('privKeyJwk').value = JSON.stringify(priv);
    document.getElementById('pubKeyJwk').value = JSON.stringify(pub);
    document.getElementById('pubKeyBlock').style.display = 'block';
    document.getElementById('pubKeyBlock').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch (e) {
    alert('❌ Не удалось сгенерировать ключевую пару: ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = original;
}

function copyPubKey(btn) {
  const val = document.getElementById('pubKeyJwk').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✅ Скопировано!';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  }).catch(() => alert('Не удалось скопировать — выделите текст вручную'));
}

/* ── GENERATE ── */
async function generateAll(btn) {
  const names = document.getElementById('students').value
    .split('\n').map(n => n.trim()).filter(n => n.length > 0);
  if (names.length === 0) { shakeInput('students'); return; }

  const privKeyStr = document.getElementById('privKeyJwk').value.trim();
  if (!privKeyStr) { shakeInput('privKeyJwk'); return; }

  let privateKey;
  try {
    privateKey = await importSigningPrivateKey(privKeyStr);
  } catch (e) {
    alert('❌ Неверный формат приватного ключа (ожидается JWK JSON). Сгенерируйте новую пару или вставьте ранее сохранённый ключ.');
    return;
  }

  const grp   = document.getElementById('grp').value.trim();
  const task  = document.getElementById('task').value.trim();
  const ttlH  = parseInt(document.getElementById('ttl').value);
  const now   = Date.now();
  const exp   = now + ttlH * 3600 * 1000;

  /* Loading state */
  const icon = document.getElementById('btnIcon');
  icon.classList.add('spin-icon');
  btn.disabled = true;

  allTokens = [];
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (let i = 0; i < names.length; i++) {
    const fio = names[i];
    const variant = 1000 + Math.floor(Math.random() * 8999);
    const payload = { fio, grp, task, var: variant, iat: now, exp, nonce: crypto.randomUUID(), seq: i + 1 };
    const bodyB64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const sig     = await signPayload(privateKey, bodyB64);
    const genesis = await sha256(bodyB64 + sig + payload.nonce);
    const token   = `${bodyB64}.${sig}.${genesis}`;
    const expDate = new Date(exp).toLocaleString('ru-RU');
    allTokens.push({ fio, grp, task, token, expDate });

    const tr = document.createElement('tr');
    tr.className = 'row-in';
    tr.style.animationDelay = `${i * 0.05}s`;
    const safeToken = token.replace(/'/g, "\\'");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td style="font-weight:600;color: var(--ink-strong)">${fio}</td>
      <td><span class="badge-grp">${grp}</span></td>
      <td><span class="exp-text">${expDate}</span></td>
      <td class="token-cell"><span class="token-shimmer">${token.slice(0, 40)}…</span><br><span style="-webkit-text-fill-color:rgba(226,232,240,0.45);font-size:9px">${token.slice(40, 80)}…</span></td>
      <td>
        <button class="copy-btn" title="Скопировать токен" onclick="copyToken(this, '${safeToken}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  }

  /* Update stats */
  const sc = document.getElementById('statCount');
  sc.textContent = names.length;
  sc.className = 'stat-val count-up';
  setTimeout(() => sc.className = 'stat-val', 600);
  document.getElementById('statGroup').textContent = grp;
  document.getElementById('statTask').textContent  = task;
  document.getElementById('statTTL').textContent   = ttlH >= 24 ? `${(ttlH / 24).toFixed(ttlH % 24 === 0 ? 0 : 1)} дн.` : `${ttlH}ч`;
  document.getElementById('countLabel').textContent = `${names.length} токенов`;

  /* Show result */
  const rc = document.getElementById('resultCard');
  rc.classList.add('visible');
  rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

  /* Show export buttons */
  document.getElementById('btnCsv').style.display  = 'inline-flex';
  document.getElementById('btnCopy').style.display = 'inline-flex';

  /* Reset button */
  icon.classList.remove('spin-icon');
  btn.disabled = false;
}

/* ── COPY TOKEN ── */
function copyToken(btn, token) {
  navigator.clipboard.writeText(token).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
    }, 2000);
  });
}

/* ── COPY ALL ── */
function copyAll(btn) {
  const text = allTokens.map(r => `${r.fio}\t${r.grp}\t${r.expDate}\t${r.token}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px"><polyline points="20 6 9 17 4 12"/></svg> Скопировано!`;
    setTimeout(() => { btn.innerHTML = orig; }, 2000);
  });
}

/* ── DOWNLOAD CSV ── */
function downloadCSV(btn) {
  const grp  = document.getElementById('grp').value;
  const task = document.getElementById('task').value;
  const rows = ['ФИО;Группа;Задание;Действителен до;Токен-ключ'];
  allTokens.forEach(r => rows.push(`${r.fio};${r.grp};${r.task};${r.expDate};${r.token}`));
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Токены_${grp}_${task}_${new Date().toLocaleDateString('ru-RU')}.csv`;
  a.click();
}

/* ── SHAKE (validation feedback) ── */
function shakeInput(id) {
  const el = document.getElementById(id);
  el.style.animation = 'none';
  el.style.borderColor = '#ff6b6b';
  el.style.boxShadow = '0 0 0 3px rgba(255,107,107,0.25)';
  el.animate([
    { transform: 'translateX(0)' },
    { transform: 'translateX(-8px)' },
    { transform: 'translateX(8px)' },
    { transform: 'translateX(-6px)' },
    { transform: 'translateX(6px)' },
    { transform: 'translateX(0)' }
  ], { duration: 400, easing: 'ease-in-out' }).onfinish = () => {
    el.style.borderColor = '';
    el.style.boxShadow = '';
  };
  el.focus();
}

/* ══════════════════════════════════════════════════════════
   ── ДЕШИФРАТОР / ВЕРИФИКАЦИЯ ОТЧЁТОВ ──
   Использует ту же функцию sha256() из блока CRYPTO UTILS выше
   ══════════════════════════════════════════════════════════ */

/* ── Верификация блокчейн-цепочки ── */
async function verifyChain(chain, genesis) {
  if (!Array.isArray(chain)) return { ok: false, brokenAt: 0, entry: null, reason: 'chain не массив' };
  if (chain.length === 0) return { ok: false, brokenAt: 0, entry: null, reason: 'цепочка пуста' };

  for (let i = 0; i < chain.length; i++) {
    const entry = chain[i];
    if (!entry || typeof entry !== 'object')
      return { ok: false, brokenAt: i, entry, reason: 'entry не объект' };
    if (!entry.ts || !entry.event || !entry.hash)
      return { ok: false, brokenAt: i, entry, reason: 'отсутствуют обязательные поля (ts, event, hash)' };

    const prev = i === 0 ? genesis : (chain[i - 1]?.hash ?? '');
    const payload = prev + JSON.stringify(entry.event) + entry.ts;
    const expected = await sha256(payload);

    if (expected !== entry.hash)
      return { ok: false, brokenAt: i, entry, reason: `hash mismatch: ожидалось ${expected}, получено ${entry.hash}` };
  }
  return { ok: true, length: chain.length, genesis: genesis };
}

/* ── Парсеры входных данных ── */
function cleanInput(raw) {
  return raw.trim().replace(/\s+/g, '');
}

function tryParseReport(raw) {
  const m = raw.match(/PZ-REPORT::(.+?)::END/s);
  if (m && m[1]) {
    const dec = decodeB64(m[1]);
    if (dec) return dec;
  }

  const clean = cleanInput(raw);
  if (/^[A-Za-z0-9+/=]+$/.test(clean) && clean.length > 100) {
    const dec = decodeB64(clean);
    if (dec) return dec;
  }

  try { return JSON.parse(raw); } catch (e) {}

  throw new Error('Не удалось распознать формат. Ожидается: PZ-REPORT::...::END, Base64 или JSON');
}

function decodeB64(b64) {
  try {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const json = new TextDecoder('utf-8').decode(bytes);
    return JSON.parse(json);
  } catch (e) {
    return null;
  }
}

/* ── Анализ рисков ── */
/* Длительность выполнения ПЗ в минутах (из meta.start/meta.end) */
function reportDurationMin(report) {
  const start = report?.meta?.start, end = report?.meta?.end;
  if (!start || !end) return 0;
  const ms = new Date(end).getTime() - new Date(start).getTime();
  return ms > 0 ? Math.round(ms / 60000) : 0;
}

/* Универсальный расчёт оценки — те же процентные пороги (68.75/81.25/93.75%),
   что и в База.html, но применённые к фактическому max_score конкретного отчёта.
   Работает для любого ПЗ, а не только для того, где максимум — 16 баллов. */
function gradeInfo(score, maxScore) {
  maxScore = maxScore || 16; // старые отчёты без max_score — считаем по исходной шкале
  if (score === null || score === undefined) return { num: null, text: '—', cls: '' };
  const t = {
    five:  Math.ceil(maxScore * 0.9375),
    four:  Math.ceil(maxScore * 0.8125),
    three: Math.ceil(maxScore * 0.6875)
  };
  if (score >= t.five)  return { num: '5', text: 'ОТЛИЧНО',            cls: 'grade-5' };
  if (score >= t.four)  return { num: '4', text: 'ХОРОШО',              cls: 'grade-4' };
  if (score >= t.three) return { num: '3', text: 'УДОВЛЕТВОРИТЕЛЬНО',   cls: 'grade-3' };
  return                       { num: '2', text: 'НЕУДОВЛЕТВОРИТЕЛЬНО', cls: 'grade-2' };
}

function analyzeRisks(report, chainOk) {
  const chain = report?.blockchain?.chain ?? [];
  const footprint = report?.footprint ?? {};
  const meta = report?.meta ?? {};

  const risks = [];
  let score = 0;

  const awayCount = footprint?.away_log?.length ?? 0;
  const awayTotalSec = footprint?.away_log?.reduce((s, r) => s + (r.seconds || 0), 0) ?? 0;
  if (awayCount > 0) {
    risks.push({ type: 'away', level: awayCount > 3 ? 'high' : 'medium',
      text: `Уход с вкладки: ${awayCount} раз, суммарно ${awayTotalSec} сек` });
    score += awayCount > 3 ? 30 : 15;
  }

  const pasteCount = footprint?.paste_log?.length ?? 0;
  if (pasteCount > 0) {
    risks.push({ type: 'paste', level: pasteCount > 5 ? 'high' : 'medium',
      text: `Вставок из буфера: ${pasteCount}` });
    score += pasteCount > 5 ? 25 : 10;
  }

  const screenshotEvents = chain.filter(e => e?.event?.type === 'SCREENSHOT_ATTEMPT');
  if (screenshotEvents.length > 0) {
    risks.push({ type: 'screenshot', level: 'high', text: `Попытки скриншота: ${screenshotEvents.length}` });
    score += 40;
  }

  const devtoolsEvents = chain.filter(e => e?.event?.desc?.includes('DevTools') || e?.event?.type === 'VIOLATION');
  if (devtoolsEvents.length > 0) {
    risks.push({ type: 'devtools', level: 'high', text: `Попытки открыть DevTools: ${devtoolsEvents.length}` });
    score += 35;
  }

  const copyBlockedEvents = chain.filter(e => e?.event?.type === 'COPY_BLOCKED');
  if (copyBlockedEvents.length > 0) {
    risks.push({ type: 'copy_blocked', level: copyBlockedEvents.length > 5 ? 'medium' : 'low',
      text: `Заблокированных попыток скопировать текст задания: ${copyBlockedEvents.length}` });
    score += copyBlockedEvents.length > 5 ? 15 : 5;
  }

  const formulaEvents = chain.filter(e => e?.event?.type === 'FORMULA_EVAL');
  if (formulaEvents.length > 5) {
    risks.push({ type: 'formula', level: 'low', text: `Использование формул: ${formulaEvents.length} (проверьте ручной ввод)` });
    score += 5;
  }

  if (meta.score === null) {
    risks.push({ type: 'unchecked', level: 'medium', text: 'Ответы не проверены курсантом перед отправкой' });
    score += 10;
  }

  /* Скорость выполнения — подозрительно быстро для полноценного ПЗ */
  const durMin = reportDurationMin(report);
  if (durMin > 0 && durMin < 3) {
    risks.push({ type: 'too_fast', level: 'high', text: `Подозрительно быстро: ${durMin} мин на всю работу` });
    score += 25;
  } else if (durMin > 0 && durMin < 5) {
    risks.push({ type: 'fast', level: 'medium', text: `Быстрое выполнение: ${durMin} мин` });
    score += 10;
  }

  /* Малоактивность мыши при значительной длительности — возможен бот/скрипт */
  const mouseSamples = footprint?.mouse_samples?.length ?? 0;
  if (mouseSamples < 5 && durMin > 2) {
    risks.push({ type: 'mouse_inactive', level: 'medium', text: `Почти нет данных о движении мыши (${mouseSamples} точек) при длительности ${durMin} мин` });
    score += 15;
  }

  /* Регулярность интервалов между нажатиями клавиш — слишком низкая дисперсия похожа на автоввод/бота */
  const keyStats = footprint?.key_stats;
  if (keyStats && typeof keyStats === 'object') {
    const intervals = Object.values(keyStats).map(v => v?.avgInterval_ms).filter(v => typeof v === 'number');
    if (intervals.length > 1) {
      const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      const variance = intervals.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / intervals.length;
      if (variance < 100) {
        risks.push({ type: 'robotic_typing', level: 'medium', text: 'Слишком равномерный ритм набора текста (низкая дисперсия интервалов) — возможен автоввод' });
        score += 15;
      }
    }
  }

  /* Нарушенная целостность блокчейн-цепочки — весомый вклад в риск-скор, а не только отдельный статус */
  if (chainOk === false) {
    risks.push({ type: 'chain_broken', level: 'high', text: 'Нарушена целостность блокчейн-цепочки событий — данные могли быть отредактированы' });
    score += 30;
  }

  let level = 'low';
  if (score >= 60) level = 'high';
  else if (score >= 25) level = 'medium';

  return {
    risks, level, score, awayCount, pasteCount,
    screenshotCount: screenshotEvents.length, devtoolsCount: devtoolsEvents.length,
    copyBlockedCount: copyBlockedEvents.length, durationMin: durMin
  };
}

/* ── Основная функция декодирования ── */
/* Разбирает и проверяет отчёт, возвращая chainCheck + riskAnalysis (без отрисовки) */
async function analyzeReport(report) {
  const chain = report?.blockchain?.chain ?? [];
  const genesis = report?.blockchain?.genesis ?? '';
  const chainCheck = await verifyChain(chain, genesis);
  const riskAnalysis = analyzeRisks(report, chainCheck.ok);
  return { chainCheck, riskAnalysis };
}

/* Обработчик формы ручного ввода/вставки отчёта */
async function decodeReport(btn) {
  const raw = document.getElementById('raw').value;
  if (!raw.trim()) { shakeInput('raw'); return; }

  let report;
  try {
    report = tryParseReport(raw);
  } catch (e) {
    alert('❌ Ошибка декодирования: ' + e.message);
    return;
  }

  const icon = document.getElementById('btnDecodeIcon');
  icon.classList.add('spin-icon');
  btn.disabled = true;

  const { chainCheck, riskAnalysis } = await analyzeReport(report);
  renderSingleReport(report, chainCheck, riskAnalysis);

  icon.classList.remove('spin-icon');
  btn.disabled = false;
  const resEl = document.getElementById('verifyResult');
  resEl.style.display = 'block';
  resEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* Загрузка одного JSON-файла — автоматически подставляет содержимое и запускает проверку */
async function handleSingleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    document.getElementById('raw').value = text;
    await decodeReport(document.getElementById('btnDecode'));
  } catch (e) {
    alert('❌ Не удалось прочитать файл: ' + e.message);
  }
  event.target.value = '';
}

/* Заполняет единый блок #verifyResult данными конкретного отчёта
   (используется и ручным вводом, и переходом «Подробно» из пакетного дашборда) */
function renderSingleReport(report, chainCheck, riskAnalysis) {
  const chain = report?.blockchain?.chain ?? [];
  const meta = report?.meta ?? {};
  const footprint = report?.footprint ?? {};
  const fp = report?.fingerprint ?? {};
  const answers = report?.answers ?? {};

  /* — РИСК-БАННЕР — */
  const riskEl = document.getElementById('riskBanner');
  const riskClass = riskAnalysis.level === 'low' ? 'risk-low' : riskAnalysis.level === 'medium' ? 'risk-med' : 'risk-high';
  const riskIcon = riskAnalysis.level === 'low' ? '✅' : riskAnalysis.level === 'medium' ? '⚠️' : '🚨';
  const riskText = riskAnalysis.level === 'low' ? 'НИЗКИЙ РИСК — нарушений не обнаружено'
    : riskAnalysis.level === 'medium' ? 'СРЕДНИЙ РИСК — обнаружены подозрительные события'
    : 'ВЫСОКИЙ РИСК — критические нарушения!';
  riskEl.innerHTML = `<div class="risk-banner ${riskClass}">${riskIcon} ${riskText}</div>`;

  /* — СВОДКА — */
  const awayCount = riskAnalysis.awayCount;
  const pasteCount = riskAnalysis.pasteCount;

  document.getElementById('summary').innerHTML = `
    <h3>📊 Сводка по курсанту</h3>
    <div class="table-wrap"><table>
      <tr><th>ФИО</th><td><b>${meta.fio ?? '—'}</b></td><th>Группа</th><td>${meta.group ?? '—'}</td></tr>
      <tr><th>Задание</th><td>${meta.task ?? '—'}</td><th>Вариант</th><td>${meta.var ?? '—'}</td></tr>
      <tr><th>Начало</th><td>${meta.start ? new Date(meta.start).toLocaleString('ru-RU') : '—'}</td>
          <th>Завершение</th><td>${meta.end ? new Date(meta.end).toLocaleString('ru-RU') : '—'}</td></tr>
      <tr><th>Длительность выполнения</th><td class="${riskAnalysis.durationMin > 0 && riskAnalysis.durationMin < 5 ? 'orange' : ''}">${riskAnalysis.durationMin > 0 ? riskAnalysis.durationMin + ' мин' : '—'}</td>
          <th>Риск-балл</th><td><b>${riskAnalysis.score}</b> / 100</td></tr>
      <tr><th>Время вне вкладки</th><td class="${awayCount > 0 ? 'red' : 'green'}">${meta.total_away ?? '—'}</td>
          <th>Nonce</th><td class="hash-mono">${meta.nonce ?? '—'}</td></tr>
      <tr><th>Уходов с вкладки</th><td class="${awayCount > 0 ? 'red' : 'green'}">${awayCount}</td>
          <th>Вставок (Paste)</th><td class="${pasteCount > 0 ? 'red' : 'green'}">${pasteCount}</td></tr>
      <tr><th>Попыток скриншота</th><td class="${riskAnalysis.screenshotCount > 0 ? 'red' : 'green'}">${riskAnalysis.screenshotCount}</td>
          <th>Событий в цепочке</th><td>${chain.length}</td></tr>
      <tr><th>Целостность цепочки</th>
          <td colspan="3" class="${chainCheck.ok ? 'green' : 'red'}">
            ${chainCheck.ok ? '✅ Блокчейн не нарушен — данные подлинные' : `❌ ЦЕПОЧКА НАРУШЕНА на событии #${chainCheck.brokenAt}! (${chainCheck.reason})`}
          </td></tr>
    </table></div>
  `;

  /* — БАЛЛ И ОЦЕНКА — */
  const scoreVal = meta.score;
  const maxScore = meta.max_score ?? 16; // старые отчёты без max_score — считаем по исходной шкале
  const gi = gradeInfo(scoreVal, maxScore);
  const scoreHtml = scoreVal !== null && scoreVal !== undefined ? `
    <div class="two-col">
      <div style="text-align:center">
        <div class="score-ring">
          <div class="score-val">${scoreVal}</div>
          <div class="score-max">/ ${maxScore}</div>
        </div>
        <div class="grade-badge ${gi.cls}">
          ${gi.text}
        </div>
      </div>
      <div>
        <h3 style="margin-bottom:8px">📈 Результат проверки</h3>
        <p><b>Практические задачи:</b> ${Object.keys(answers?.tasks ?? {}).length} полей отвечено</p>
        <p><b>Тестовые задания:</b> ${Object.keys(answers?.tests ?? {}).length} отвечено</p>
        <p style="margin-top:12px">
          ${gi.num === '5' ? '✅ Отличный результат! Материал освоен на высоком уровне.'
            : gi.num === '4' ? '⚠️ Хороший результат. Рекомендуется повторить ошибочные темы.'
            : gi.num === '3' ? '⚠️ Удовлетворительный результат. Необходимо дополнительное изучение.'
            : '❌ Работа не зачтена. Требуется повторное прохождение.'}
        </p>
      </div>
    </div>
  ` : `<div class="empty-state">❌ Ответы не были проверены курсантом перед отправкой отчёта</div>`;

  document.getElementById('scoreCard').innerHTML = `<h3>🎯 Балл и оценка</h3>${scoreHtml}`;

  /* — НАРУШЕНИЯ — */
  const violationEvents = chain.filter(e =>
    ['TAB_LEFT', 'WINDOW_BLUR', 'PASTE_DETECTED', 'VIOLATION', 'SCREENSHOT_ATTEMPT', 'PAGE_CLOSE_ATTEMPT', 'COPY_BLOCKED'].includes(e?.event?.type)
  );

  let vHtml = '<h3>⚠️ Нарушения и подозрительные события</h3>';
  if (violationEvents.length === 0) {
    vHtml += '<p class="green">✅ Подозрительных событий не обнаружено</p>';
  } else {
    vHtml += '<div class="table-wrap"><table><thead><tr><th>#</th><th>Время</th><th>Тип</th><th>Серьёзность</th><th>Подробности</th></tr></thead><tbody>';
    violationEvents.forEach((v, idx) => {
      const type = v?.event?.type;
      const badgeClass = type === 'VIOLATION' || type === 'SCREENSHOT_ATTEMPT' ? 'badge-danger'
        : type === 'PASTE_DETECTED' || type === 'COPY_BLOCKED' ? 'badge-warn' : 'badge-info';
      const label = {
        TAB_LEFT: 'Уход с вкладки',
        TAB_RETURNED: 'Возвращение на вкладку',
        WINDOW_BLUR: 'Смена окна/программы',
        WINDOW_FOCUS: 'Возврат фокуса',
        PASTE_DETECTED: 'ВСТАВКА ТЕКСТА',
        COPY_DETECTED: 'Копирование',
        COPY_BLOCKED: 'ПОПЫТКА КОПИРОВАНИЯ ТЕКСТА ЗАДАНИЯ',
        VIOLATION: 'НАРУШЕНИЕ',
        SCREENSHOT_ATTEMPT: 'ПОПЫТКА СКРИНШОТА',
        PAGE_CLOSE_ATTEMPT: 'Попытка закрыть страницу',
        FORMULA_EVAL: 'Формула'
      }[type] || type;

      let details = '';
      if (type === 'PASTE_DETECTED') {
        details = `Поле: <b>${v.event.field}</b>, ${v.event.chars} симв.<br><span class="hl-paste">${v.event.preview ?? v.event.full ?? '—'}</span>`;
      } else if (type === 'VIOLATION') {
        details = v.event.desc ?? JSON.stringify(v.event);
      } else if (type === 'COPY_BLOCKED') {
        details = v.event.desc ?? 'Попытка скопировать текст условия задачи/вопроса была заблокирована';
      } else if (type === 'SCREENSHOT_ATTEMPT') {
        details = `Метод: ${v.event.method ?? '—'}`;
      } else if (type === 'TAB_LEFT') {
        details = 'Курсант покинул вкладку задания';
      } else if (type === 'TAB_RETURNED') {
        details = `Отсутствовал ${v.event.away_seconds ?? '?'} сек`;
      } else {
        details = JSON.stringify(v.event);
      }

      vHtml += `<tr>
        <td>${idx + 1}</td>
        <td>${v?.ts ? new Date(v.ts).toLocaleTimeString('ru-RU') : '—'}</td>
        <td><span class="badge ${badgeClass}">${label}</span></td>
        <td>${v.severity ?? '—'}</td>
        <td>${details}</td>
      </tr>`;
    });
    vHtml += '</tbody></table></div>';
  }
  document.getElementById('violations').innerHTML = vHtml;

  /* — ВСТАВКИ (детально) — */
  const pasteLog = footprint?.paste_log ?? [];
  let pHtml = '<h3>📋 Детали вставок (Paste) — содержимое буфера обмена</h3>';
  if (pasteLog.length === 0) {
    pHtml += '<p class="green">✅ Вставок не обнаружено</p>';
  } else {
    pHtml += '<div class="table-wrap"><table><thead><tr><th>Время</th><th>Поле</th><th>Символов</th><th>Содержимое</th></tr></thead><tbody>';
    pasteLog.forEach((p) => {
      pHtml += `<tr>
        <td>${p?.ts ? new Date(p.ts).toLocaleTimeString('ru-RU') : '—'}</td>
        <td>${p?.field ?? '—'}</td>
        <td class="${(p?.chars ?? 0) > 50 ? 'red' : ''}">${p?.chars ?? '—'}</td>
        <td style="max-width:400px;overflow-wrap:break-word"><span class="hl-paste"><b>${p?.full ?? p?.preview ?? '—'}</b></span></td>
      </tr>`;
    });
    pHtml += '</tbody></table></div>';
  }
  document.getElementById('pastes').innerHTML = pHtml;

  /* — СКРИНШОТЫ — */
  const screenshotEvents = chain.filter(e => e?.event?.type === 'SCREENSHOT_ATTEMPT');
  let sHtml = '<h3>📸 Попытки скриншота</h3>';
  if (screenshotEvents.length === 0) {
    sHtml += '<p class="green">✅ Попыток скриншота не обнаружено</p>';
  } else {
    sHtml += '<div class="table-wrap"><table><thead><tr><th>Время</th><th>Метод</th><th>Действие системы</th></tr></thead><tbody>';
    screenshotEvents.forEach(s => {
      sHtml += `<tr>
        <td>${s?.ts ? new Date(s.ts).toLocaleTimeString('ru-RU') : '—'}</td>
        <td class="red"><b>${s?.event?.method ?? '—'}</b></td>
        <td>Буфер обмена перетёрт предупреждением, событие записано в журнал</td>
      </tr>`;
    });
    sHtml += '</tbody></table></div>';
  }
  document.getElementById('screenshots').innerHTML = sHtml;

  /* — FINGERPRINT — */
  const screen = fp?.screen ?? {};
  const hardware = fp?.hardware ?? {};
  const browser = fp?.browser ?? {};
  const system = fp?.system ?? {};
  const cryptoFp = fp?.crypto ?? {};

  document.getElementById('fpBlock').innerHTML = `
    <h3>🖥️ Fingerprint — устройство курсанта</h3>
    <div class="table-wrap"><table>
      <tr><th>Device ID (SHA-256)</th><td colspan="3" class="hash-mono">${fp?.deviceID ?? '—'}</td></tr>
      <tr><th>Visitor ID (FingerprintJS)</th><td colspan="3" class="hash-mono">${fp?.visitorId ?? '—'}</td></tr>
      <tr><th>Экран</th><td>${screen?.width ?? '—'}×${screen?.height ?? '—'}, ${screen?.colorDepth ?? '—'}bpp, DPR ${screen?.pixelRatio ?? '—'}</td>
          <th>Ядра CPU</th><td>${hardware?.cores ?? '—'}</td></tr>
      <tr><th>RAM</th><td>${hardware?.memory ?? '—'} GB</td>
          <th>Touch points</th><td>${hardware?.touch ?? '—'}</td></tr>
      <tr><th>Платформа</th><td>${browser?.platform ?? '—'}</td>
          <th>Язык</th><td>${browser?.language ?? '—'}</td></tr>
      <tr><th>Timezone</th><td>${system?.timezone ?? '—'}</td>
          <th>Смещение</th><td>UTC${(system?.timezoneOffset ?? 0) > 0 ? '-' : '+'}${Math.abs(system?.timezoneOffset ?? 0) / 60}</td></tr>
      <tr><th>Canvas hash</th><td colspan="3" class="hash-mono">${cryptoFp?.canvas ?? '—'}</td></tr>
      <tr><th>Audio hash</th><td colspan="3" class="hash-mono">${cryptoFp?.audio ?? '—'}</td></tr>
      <tr><th>WebGL GPU</th><td colspan="3">${(typeof cryptoFp?.webgl === 'object' ? (cryptoFp?.webgl?.vendor + ' / ' + cryptoFp?.webgl?.renderer) : cryptoFp?.webgl) ?? '—'}</td></tr>
      <tr><th>Шрифты</th><td colspan="3">${(fp?.fonts ?? []).join(', ') || '—'}</td></tr>
      <tr><th>User Agent</th><td colspan="3" style="font-size:11px;word-break:break-all">${browser?.userAgent ?? '—'}</td></tr>
    </table></div>
  `;

  /* — ТАЙМИНГИ ПОЛЕЙ — */
  const fieldTimings = footprint?.field_timings ?? {};
  const timingEntries = Object.entries(fieldTimings);
  let tHtml = '<h3>⏱️ Тайминги полей ввода</h3>';
  if (timingEntries.length === 0) {
    tHtml += '<p class="empty-state">Нет данных о таймингах</p>';
  } else {
    tHtml += '<div class="table-wrap"><table><thead><tr><th>Поле</th><th>Время (сек)</th><th>Символов</th><th>Средняя скорость</th></tr></thead><tbody>';
    timingEntries.forEach(([field, timing]) => {
      const sec = Math.round((timing?.totalMs ?? 0) / 1000);
      const chars = timing?.char_count ?? 0;
      const wpm = sec > 0 ? Math.round((chars / 5) / (sec / 60)) : '—';
      tHtml += `<tr>
        <td><code>${field}</code></td>
        <td>${sec}</td>
        <td>${chars}</td>
        <td>${wpm !== '—' ? wpm + ' WPM' : '—'}</td>
      </tr>`;
    });
    tHtml += '</tbody></table></div>';
  }
  document.getElementById('timings').innerHTML = tHtml;

  /* — ОТВЕТЫ — */
  let aHtml = '<h3>📝 Ответы курсанта</h3>';

  const taskAnswers = answers?.tasks ?? {};
  const taskEntries = Object.entries(taskAnswers);
  if (taskEntries.length > 0) {
    aHtml += '<h4 style="color:var(--primary)">Часть I. Практические задачи</h4>';
    aHtml += '<div class="table-wrap"><table><thead><tr><th>Поле</th><th>Ответ</th><th>Формула</th></tr></thead><tbody>';
    taskEntries.forEach(([field, val]) => {
      const hasFormula = val?.startsWith?.('=') || (typeof val === 'string' && val.includes('formula'));
      aHtml += `<tr>
        <td><code>${field}</code></td>
        <td>${val ?? '<i style="color:var(--ink-muted)">пусто</i>'}</td>
        <td>${hasFormula ? '<span class="formula-tag">ƒx формула</span>' : '—'}</td>
      </tr>`;
    });
    aHtml += '</tbody></table></div>';
  }

  const testAnswers = answers?.tests ?? {};
  const testEntries = Object.entries(testAnswers);
  if (testEntries.length > 0) {
    aHtml += '<h4 style="color:var(--accent)">Часть II. Тестовые задания</h4>';
    aHtml += '<div class="table-wrap"><table><thead><tr><th>Вопрос</th><th>Выбранные варианты</th></tr></thead><tbody>';
    testEntries.forEach(([q, vals]) => {
      aHtml += `<tr>
        <td><code>${q}</code></td>
        <td>${Array.isArray(vals) ? vals.join(', ') : (vals ?? '<i style="color:var(--ink-muted)">пусто</i>')}</td>
      </tr>`;
    });
    aHtml += '</tbody></table></div>';
  }

  if (taskEntries.length === 0 && testEntries.length === 0) {
    aHtml += '<p class="empty-state">Нет данных об ответах</p>';
  }

  document.getElementById('answers').innerHTML = aHtml;

  /* — ПОЛНЫЙ ЛОГ — */
  document.getElementById('chainLog').textContent = JSON.stringify(chain, null, 2);
}

/* ══════════════════════════════════════════════════════════
   ── ПАКЕТНАЯ ПРОВЕРКА (30+ ФАЙЛОВ) + АНАЛИТИЧЕСКИЙ ДАШБОРД ──
   ══════════════════════════════════════════════════════════ */
let batchResults = [];

async function handleBatchFiles(event) {
  const files = Array.from(event.target.files || []).filter(f => f.name.toLowerCase().endsWith('.json') || f.name.toLowerCase().endsWith('.txt'));
  await processBatchFiles(files);
  event.target.value = '';
}

async function processBatchFiles(files) {
  if (files.length === 0) return;

  const progressEl = document.getElementById('batchProgress');
  const dash = document.getElementById('batchDashboard');
  dash.style.display = 'none';
  progressEl.style.display = 'inline';
  batchResults = [];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    progressEl.textContent = `⏳ Обработка ${i + 1} / ${files.length}: ${file.name}`;
    try {
      const text = await file.text();
      const report = tryParseReport(text);
      const { chainCheck, riskAnalysis } = await analyzeReport(report);
      batchResults.push({ fileName: file.name, report, chainCheck, riskAnalysis, error: null, _origIdx: batchResults.length });
    } catch (e) {
      batchResults.push({ fileName: file.name, report: null, chainCheck: null, riskAnalysis: null, error: e.message || 'Не удалось разобрать файл', _origIdx: batchResults.length });
    }
  }

  progressEl.textContent = `✅ Обработано файлов: ${files.length}`;
  populateBatchFilters();
  document.getElementById('batchFilters').style.display = 'flex';
  applyBatchFilters();
}

/* ── ФИЛЬТРЫ ПАКЕТНОГО ДАШБОРДА ── */
function populateBatchFilters() {
  const groups = [...new Set(batchResults.filter(r => !r.error).map(r => r.report?.meta?.group).filter(Boolean))].sort();
  const sel = document.getElementById('batchFilterGroup');
  const current = sel.value;
  sel.innerHTML = '<option value="">Все группы</option>' + groups.map(g => `<option value="${g}">${g}</option>`).join('');
  if (groups.includes(current)) sel.value = current;
}

let batchFilterDebounce = null;
function debouncedApplyBatchFilters() {
  clearTimeout(batchFilterDebounce);
  batchFilterDebounce = setTimeout(applyBatchFilters, 200);
}

function applyBatchFilters() {
  const fio   = (document.getElementById('batchFilterFio').value || '').toLowerCase().trim();
  const grp   = document.getElementById('batchFilterGroup').value;
  const grade = document.getElementById('batchFilterGrade').value;
  const risk  = document.getElementById('batchFilterRisk').value;
  const dFrom = document.getElementById('batchFilterDateFrom').value;
  const dTo   = document.getElementById('batchFilterDateTo').value;

  const filtered = batchResults.filter(r => {
    if (r.error) return true; // файлы с ошибкой разбора всегда видны — требуют внимания
    const meta = r.report?.meta ?? {};
    if (fio && !(meta.fio || '').toLowerCase().includes(fio)) return false;
    if (grp && meta.group !== grp) return false;
    if (grade) {
      const sv = meta.score;
      const g = (sv === null || sv === undefined) ? null : gradeInfo(sv, meta.max_score ?? 16).num;
      if (g !== grade) return false;
    }
    if (risk && r.riskAnalysis.level !== risk) return false;
    if (dFrom || dTo) {
      const d = meta.start ? new Date(meta.start).toISOString().slice(0, 10) : '';
      if (dFrom && d < dFrom) return false;
      if (dTo && d > dTo) return false;
    }
    return true;
  });

  const countEl = document.getElementById('batchFilterCount');
  if (countEl) countEl.textContent = `Показано ${filtered.length} из ${batchResults.length}`;
  renderDashboard(filtered);
}

function resetBatchFilters() {
  document.getElementById('batchFilterFio').value = '';
  document.getElementById('batchFilterGroup').value = '';
  document.getElementById('batchFilterGrade').value = '';
  document.getElementById('batchFilterRisk').value = '';
  document.getElementById('batchFilterDateFrom').value = '';
  document.getElementById('batchFilterDateTo').value = '';
  applyBatchFilters();
}

/* ── DRAG & DROP для пакетной загрузки ── */
(function setupBatchDropZone() {
  const zone = document.getElementById('batchDropZone');
  if (!zone) return;
  ['dragenter', 'dragover'].forEach(evt => {
    zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); zone.classList.add('dropzone-active'); });
  });
  ['dragleave', 'drop'].forEach(evt => {
    zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); zone.classList.remove('dropzone-active'); });
  });
  zone.addEventListener('drop', e => {
    const files = Array.from(e.dataTransfer.files || []).filter(f => f.name.toLowerCase().endsWith('.json') || f.name.toLowerCase().endsWith('.txt'));
    if (files.length === 0) { alert('Перетащите JSON-файлы отчётов'); return; }
    processBatchFiles(files);
  });
})();

/* ── SVG-диаграммы (без внешних зависимостей) ── */
function svgDonut(segments, size) {
  size = size || 150;
  const r = size * 0.36, cx = size / 2, cy = size / 2, sw = size * 0.13;
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  const circumference = 2 * Math.PI * r;
  let offset = 0, circles = '';
  segments.forEach(seg => {
    const frac = seg.value / total;
    const dash = frac * circumference;
    if (seg.value > 0) {
      circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${circumference - dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    }
    offset += dash;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="${sw}"/>
    ${circles}
    <text x="${cx}" y="${cy - 2}" text-anchor="middle" style="fill:var(--ink-strong)" font-size="${size*0.16}" font-weight="900" font-family="Inter,sans-serif">${total}</text>
    <text x="${cx}" y="${cy + size*0.12}" text-anchor="middle" fill="rgba(226,232,240,0.55)" font-size="${size*0.07}" font-family="Inter,sans-serif">отчётов</text>
  </svg>`;
}

function legendList(segments) {
  return segments.map(s => `
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-muted);margin-bottom:8px">
      <span style="width:11px;height:11px;border-radius:3px;background:${s.color};display:inline-block;flex-shrink:0"></span>
      <span style="flex:1">${s.label}</span>
      <b style="color: var(--ink-strong)">${s.value}</b>
    </div>`).join('');
}

function barChartHtml(items) {
  const maxVal = Math.max(...items.map(i => i.value), 1);
  return items.map(it => {
    const pct = Math.round((it.value / maxVal) * 100);
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-muted);margin-bottom:5px">
        <span>${it.label}</span><b style="color: var(--ink-strong)">${it.value}</b>
      </div>
      <div style="height:10px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${it.color};border-radius:99px"></div>
      </div>
    </div>`;
  }).join('');
}

/* ── Отрисовка дашборда по результатам пакетной проверки ── */
/* ══════════════════════════════════════════════════════════
   ── ДЕТЕКЦИЯ ПЛАГИАТА (сходство ответов между курсантами) ──
   ══════════════════════════════════════════════════════════ */
function answerSimilarity(repA, repB) {
  const aT = repA?.answers?.tasks ?? {}, bT = repB?.answers?.tasks ?? {};
  const aQ = repA?.answers?.tests ?? {}, bQ = repB?.answers?.tests ?? {};

  let match = 0, total = 0;

  new Set([...Object.keys(aT), ...Object.keys(bT)]).forEach(k => {
    const av = (aT[k] ?? '').toString().trim().toLowerCase();
    const bv = (bT[k] ?? '').toString().trim().toLowerCase();
    if (!av && !bv) return;              // оба пустых — не учитываем
    total++;
    if (av && av === bv) match++;
  });

  new Set([...Object.keys(aQ), ...Object.keys(bQ)]).forEach(k => {
    const av = JSON.stringify(aQ[k] ?? null);
    const bv = JSON.stringify(bQ[k] ?? null);
    total++;
    if (av !== 'null' && av === bv) match++;
  });

  return total > 0 ? match / total : 0;
}

function findPlagiarismPairs(ok, threshold) {
  threshold = threshold ?? 0.75;
  const pairs = [];
  for (let i = 0; i < ok.length; i++) {
    for (let j = i + 1; j < ok.length; j++) {
      const sim = answerSimilarity(ok[i].report, ok[j].report);
      if (sim >= threshold) pairs.push({ a: ok[i], b: ok[j], sim });
    }
  }
  return pairs.sort((x, y) => y.sim - x.sim);
}

/* ══════════════════════════════════════════════════════════
   ── СОВПАДЕНИЯ УСТРОЙСТВ («кто чьим устройством пользовался») ──
   ══════════════════════════════════════════════════════════ */
function findDeviceCollisions(ok) {
  const byDevice = {}, byVisitor = {};
  ok.forEach(r => {
    const dId = r.report?.fingerprint?.deviceID;
    const vId = r.report?.fingerprint?.visitorId;
    if (dId) (byDevice[dId] = byDevice[dId] || []).push(r);
    if (vId) (byVisitor[vId] = byVisitor[vId] || []).push(r);
  });
  const groups = new Map(); // key: комбинация участников, чтобы не дублировать
  Object.values(byDevice).filter(g => g.length > 1).forEach(g => {
    groups.set(g.map(x => x._i).sort().join(','), { members: g, matchType: 'Device ID + Visitor ID' });
  });
  Object.values(byVisitor).filter(g => g.length > 1).forEach(g => {
    const key = g.map(x => x._i).sort().join(',');
    if (!groups.has(key)) groups.set(key, { members: g, matchType: 'Visitor ID (FingerprintJS)' });
  });
  return [...groups.values()];
}

/* ══════════════════════════════════════════════════════════
   ── ТЕПЛОВАЯ КАРТА ВРЕМЕНИ ПО ЗАДАНИЯМ ──
   ══════════════════════════════════════════════════════════ */
function buildTimeHeatmapHtml(ok) {
  if (ok.length === 0) return '<p class="empty-state">Нет данных для построения карты</p>';

  /* Ключи полей берём из фактических данных (не зашиты числом) — работает для
     любого ПЗ с любым количеством задач/тестов, если он использует привычную
     схему имён "task-N" / "task-N-M" / "q-N"; для иной схемы имён — просто
     показываем сам ключ, обрезанный до разумной длины. */
  const keySet = new Set();
  ok.forEach(r => {
    const ft = r.report?.footprint?.field_timings ?? {};
    Object.keys(ft).forEach(k => keySet.add(k));
  });

  const parseKey = k => {
    const m = k.match(/^(task|q)-(\d+)(?:-(\d+))?$/);
    if (!m) return [2, 0, 0];
    return [m[1] === 'task' ? 0 : 1, parseInt(m[2], 10), m[3] !== undefined ? parseInt(m[3], 10) : -1];
  };
  const fieldOrder = [...keySet].sort((a, b) => {
    const pa = parseKey(a), pb = parseKey(b);
    return pa[0] - pb[0] || pa[1] - pb[1] || pa[2] - pb[2] || a.localeCompare(b);
  });

  const subLetters = 'абвгдежзиклмн';
  const labels = fieldOrder.map(k => {
    const m = k.match(/^task-(\d+)(?:-(\d+))?$/);
    if (m) return 'З' + (parseInt(m[1], 10) + 1) + (m[2] !== undefined ? (subLetters[parseInt(m[2], 10)] || ('.' + m[2])) : '');
    const mq = k.match(/^q-(\d+)$/);
    if (mq) return 'Т' + (parseInt(mq[1], 10) + 1);
    return k.length > 7 ? k.slice(0, 7) : k; // нестандартная схема имён полей
  });

  if (fieldOrder.length === 0) return '<p class="empty-state">В отчётах нет данных о таймингах полей</p>';

  const rows = ok.map(r => {
    const ft = r.report?.footprint?.field_timings ?? {};
    return {
      fio: r.report?.meta?.fio ?? r.fileName,
      vals: fieldOrder.map(f => Math.round((ft[f]?.totalMs ?? 0) / 1000))
    };
  });
  const colMax = fieldOrder.map((_, ci) => Math.max(1, ...rows.map(r => r.vals[ci])));

  let html = '<div style="overflow:auto;max-height:480px;border:1px solid var(--border);border-radius:var(--radius-md)">';
  html += '<table style="border-collapse:collapse;width:100%;font-size:11px">';
  html += '<thead><tr style="position:sticky;top:0;background:var(--surface-solid);z-index:2">';
  html += '<th style="position:sticky;left:0;background:var(--surface-solid);z-index:3;text-align:left;padding:8px 12px;min-width:150px">ФИО</th>';
  labels.forEach(l => { html += `<th style="text-align:center;padding:8px 3px;min-width:32px">${l}</th>`; });
  html += '</tr></thead><tbody>';

  rows.forEach(r => {
    html += `<tr><td style="position:sticky;left:0;background:var(--surface-solid);padding:6px 12px;white-space:nowrap;color: var(--ink-strong);font-weight:600;border-bottom:1px solid var(--border)">${r.fio}</td>`;
    r.vals.forEach((v, ci) => {
      const alpha = Math.min(0.92, v / colMax[ci]);
      html += `<td style="text-align:center;padding:6px 2px;border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(0,212,255,${alpha.toFixed(2)});color:${alpha > 0.5 ? 'var(--ink-strong)' : 'var(--ink-muted)'}">${v || '·'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += '<p style="margin-top:12px;font-size:12px;color:var(--ink-muted)">Цвет ячейки — время (сек), потраченное на поле, относительно максимума в группе по этому же полю. Подозрительно короткое время часто указывает на вставку готового ответа, подозрительно долгое — на поиск решения в сети.</p>';
  return html;
}

/* ── СОРТИРОВКА СВОДНОЙ ТАБЛИЦЫ ── */
let batchTableRows = [];
let batchSortState = { key: null, dir: 1 };

function sortBatchTable(key) {
  if (batchSortState.key === key) batchSortState.dir *= -1;
  else { batchSortState.key = key; batchSortState.dir = 1; }
  renderBatchTableBody();
}

function renderBatchTableBody() {
  const { key, dir } = batchSortState;
  let rows = [...batchTableRows];
  if (key) {
    rows.sort((a, b) => {
      const av = a.sortVals[key], bv = b.sortVals[key];
      if (av === bv) return 0;
      return av < bv ? -1 * dir : 1 * dir;
    });
  }
  const tbody = document.getElementById('batchTableBody');
  if (tbody) tbody.innerHTML = rows.map(r => r.rowHtml).join('');
  document.querySelectorAll('#batchTableHead th[data-sort]').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.remove();
    if (th.dataset.sort === key) {
      th.insertAdjacentHTML('beforeend', `<span class="sort-arrow" style="margin-left:4px;color:var(--primary)">${dir > 0 ? '▲' : '▼'}</span>`);
    }
  });
}

function renderDashboard(results) {
  const withIdx = results.map(r => ({ ...r, _i: r._origIdx }));
  const ok = withIdx.filter(r => !r.error);
  const errored = withIdx.filter(r => r.error);
  const scored = ok.filter(r => r.report?.meta?.score !== null && r.report?.meta?.score !== undefined);

  const avgScore = scored.length ? (scored.reduce((s, r) => s + r.report.meta.score, 0) / scored.length).toFixed(1) : '—';
  const batchMaxScore = scored.length ? Math.max(...scored.map(r => r.report.meta.max_score ?? 16)) : 16;
  const passCount = scored.filter(r => gradeInfo(r.report.meta.score, r.report.meta.max_score ?? 16).num !== '2').length;
  const passRate = scored.length ? Math.round((passCount / scored.length) * 100) : 0;

  const riskCounts = { low: 0, medium: 0, high: 0 };
  ok.forEach(r => { riskCounts[r.riskAnalysis.level] = (riskCounts[r.riskAnalysis.level] || 0) + 1; });

  const gradeCounts = { '5': 0, '4': 0, '3': 0, '2': 0 };
  scored.forEach(r => {
    const g = gradeInfo(r.report.meta.score, r.report.meta.max_score ?? 16).num;
    gradeCounts[g]++;
  });

  /* Гистограмма распределения баллов — шаг подстраивается под фактический максимум ПЗ */
  const binCount = 8;
  const binStep = Math.max(1, Math.ceil(batchMaxScore / binCount));
  const scoreBins = Array.from({ length: binCount }, (_, i) => {
    const from = i * binStep, to = Math.min(batchMaxScore, (i + 1) * binStep);
    return { label: `${from}-${to}`, value: 0 };
  });
  scored.forEach(r => {
    const bin = Math.min(binCount - 1, Math.floor((r.report.meta.score || 0) / binStep));
    scoreBins[bin].value++;
  });

  /* Средний балл по группам */
  const groupAgg = {};
  scored.forEach(r => {
    const g = r.report.meta.group || '—';
    (groupAgg[g] = groupAgg[g] || []).push(r.report.meta.score);
  });
  const groupAverages = Object.entries(groupAgg)
    .map(([g, vals]) => ({ label: g, value: +(vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1), color: '#00D4FF' }))
    .sort((a, b) => a.label.localeCompare(b.label));

  const chainFailCount = ok.filter(r => !r.chainCheck.ok).length;
  const totalAway = ok.reduce((s, r) => s + (r.riskAnalysis.awayCount || 0), 0);
  const totalPaste = ok.reduce((s, r) => s + (r.riskAnalysis.pasteCount || 0), 0);
  const totalScreenshot = ok.reduce((s, r) => s + (r.riskAnalysis.screenshotCount || 0), 0);
  const totalDevtools = ok.reduce((s, r) => s + (r.riskAnalysis.devtoolsCount || 0), 0);
  const totalCopyBlocked = ok.reduce((s, r) => s + (r.riskAnalysis.copyBlockedCount || 0), 0);

  const durations = ok.map(r => r.riskAnalysis.durationMin).filter(d => d > 0);
  const avgDuration = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : '—';
  const uniqueDevices = new Set(ok.map(r => r.report?.fingerprint?.deviceID).filter(Boolean)).size;

  const plagiarismPairs = findPlagiarismPairs(ok, 0.75);
  const deviceCollisions = findDeviceCollisions(ok);

  let html = '';

  /* — СТАТ-СТРИП — */
  html += `
    <div class="glass-card">
      <h3>📊 Общая аналитика по группе</h3>
      <div class="stat-strip">
        <div class="stat-box"><span class="stat-val">${results.length}</span><span class="stat-lbl">Отчётов загружено</span></div>
        <div class="stat-box"><span class="stat-val" style="color:${avgScore !== '—' && (avgScore / batchMaxScore) >= 0.8125 ? 'var(--success)' : 'var(--primary)'}">${avgScore}</span><span class="stat-lbl">Средний балл</span></div>
        <div class="stat-box"><span class="stat-val" style="color:var(--success)">${passRate}%</span><span class="stat-lbl">Успеваемость</span></div>
        <div class="stat-box"><span class="stat-val" style="color:var(--danger)">${riskCounts.high}</span><span class="stat-lbl">Высокий риск</span></div>
        <div class="stat-box"><span class="stat-val">${avgDuration}${avgDuration !== '—' ? ' мин' : ''}</span><span class="stat-lbl">Среднее время</span></div>
        <div class="stat-box"><span class="stat-val">${uniqueDevices}</span><span class="stat-lbl">Уникальных устройств</span></div>
        <div class="stat-box"><span class="stat-val" style="color:${chainFailCount > 0 ? 'var(--danger)' : 'var(--success)'}">${chainFailCount}</span><span class="stat-lbl">Цепочка нарушена</span></div>
        <div class="stat-box"><span class="stat-val" style="color:${plagiarismPairs.length > 0 ? 'var(--danger)' : 'var(--success)'}">${plagiarismPairs.length}</span><span class="stat-lbl">Пар с совпадением ответов</span></div>
        <div class="stat-box"><span class="stat-val" style="color:${deviceCollisions.length > 0 ? 'var(--danger)' : 'var(--success)'}">${deviceCollisions.length}</span><span class="stat-lbl">Совпадений устройств</span></div>
        ${errored.length ? `<div class="stat-box"><span class="stat-val" style="color:var(--warn)">${errored.length}</span><span class="stat-lbl">Не распознано</span></div>` : ''}
      </div>
    </div>`;

  /* — ДИАГРАММЫ — */
  html += `
    <div class="glass-card">
      <h3>📈 Диаграммы по группе</h3>
      <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr">
        <div>
          <h4 style="margin-top:0">Распределение риска</h4>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            ${svgDonut([
              { label: 'Низкий', value: riskCounts.low, color: '#00FFB3' },
              { label: 'Средний', value: riskCounts.medium, color: '#FFD700' },
              { label: 'Высокий', value: riskCounts.high, color: '#FF6B6B' }
            ], 130)}
            <div style="flex:1;min-width:120px">
              ${legendList([
                { label: 'Низкий риск', value: riskCounts.low, color: '#00FFB3' },
                { label: 'Средний риск', value: riskCounts.medium, color: '#FFD700' },
                { label: 'Высокий риск', value: riskCounts.high, color: '#FF6B6B' }
              ])}
            </div>
          </div>
        </div>
        <div>
          <h4 style="margin-top:0">Оценки (${scored.length} проверено)</h4>
          ${barChartHtml([
            { label: 'Отлично (5)', value: gradeCounts['5'], color: '#00FFB3' },
            { label: 'Хорошо (4)', value: gradeCounts['4'], color: '#00D4FF' },
            { label: 'Удовл. (3)', value: gradeCounts['3'], color: '#FFD700' },
            { label: 'Неудовл. (2)', value: gradeCounts['2'], color: '#FF6B6B' }
          ])}
        </div>
        <div>
          <h4 style="margin-top:0">Нарушения по типам (сумма)</h4>
          ${barChartHtml([
            { label: 'Уходы с вкладки', value: totalAway, color: '#00D4FF' },
            { label: 'Вставки (paste)', value: totalPaste, color: '#FFD700' },
            { label: 'Попытки скриншота', value: totalScreenshot, color: '#FF6B6B' },
            { label: 'Попытки DevTools', value: totalDevtools, color: '#7C3AED' },
            { label: 'Копирование текста заблокировано', value: totalCopyBlocked, color: '#FF9F43' }
          ])}
        </div>
      </div>
    </div>`;

  /* — ГИСТОГРАММА БАЛЛОВ И СРЕДНИЙ БАЛЛ ПО ГРУППАМ — */
  html += `
    <div class="glass-card">
      <h3>📊 Распределение баллов и группы</h3>
      <div class="form-grid" style="grid-template-columns:1fr 1fr">
        <div>
          <h4 style="margin-top:0">Гистограмма баллов (${scored.length} проверено)</h4>
          ${scored.length ? barChartHtml(scoreBins.map((b, i) => ({ ...b, color: i >= 6 ? '#00FFB3' : i >= 4 ? '#00D4FF' : i >= 2 ? '#FFD700' : '#FF6B6B' }))) : '<p class="empty-state">Нет проверенных работ</p>'}
        </div>
        <div>
          <h4 style="margin-top:0">Средний балл по группам (${groupAverages.length})</h4>
          ${groupAverages.length ? barChartHtml(groupAverages.map(g => ({ ...g, color: (g.value / batchMaxScore) >= 0.8125 ? '#00FFB3' : (g.value / batchMaxScore) >= 0.6875 ? '#00D4FF' : '#FFD700' }))) : '<p class="empty-state">Нет проверенных работ</p>'}
        </div>
      </div>
    </div>`;

  /* — ЦЕЛОСТНОСТЬ ЦЕПОЧЕК СОБЫТИЙ — */
  html += `
    <div class="glass-card">
      <h3>🔗 Верификация цепочки событий</h3>`;
  if (chainFailCount === 0) {
    html += `<p class="green">✅ У всех ${ok.length} отчётов блокчейн-цепочка событий целостна — данные не подделаны</p>`;
  } else {
    html += `<p class="red" style="margin-bottom:12px">❌ Обнаружено отчётов с нарушенной цепочкой: <b>${chainFailCount}</b> — данные могли быть отредактированы после формирования</p>`;
    html += '<div class="table-wrap"><table><thead><tr><th>ФИО</th><th>Файл</th><th>Нарушение на событии #</th><th>Причина</th></tr></thead><tbody>';
    ok.filter(r => !r.chainCheck.ok).forEach(r => {
      html += `<tr>
        <td style="font-weight:600;color: var(--ink-strong)">${r.report?.meta?.fio ?? '—'}</td>
        <td style="font-size:11px;color:var(--ink-muted)">${r.fileName}</td>
        <td>${r.chainCheck.brokenAt ?? '—'}</td>
        <td class="red">${r.chainCheck.reason ?? '—'}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }
  html += `</div>`;

  /* — ДЕТЕКЦИЯ ПЛАГИАТА — */
  html += `
    <div class="glass-card">
      <h3>🕵️ Детекция плагиата (сходство ответов)</h3>
      <p style="margin-bottom:14px">Сравнение ответов на практические задачи и тесты между всеми парами курсантов. Показаны пары с совпадением ≥ 75%.
      <b style="color:var(--warn)">Важно:</b> у практических задач один правильный числовой ответ — совпадение верных ответов ожидаемо и само по себе не доказывает списывание; обращайте больше внимания на пары с высоким совпадением при <i>низком</i> балле или совпадением ошибочных ответов.</p>`;
  if (plagiarismPairs.length === 0) {
    html += `<p class="green">✅ Пар с подозрительно высоким совпадением ответов не обнаружено</p>`;
  } else {
    html += '<div class="table-wrap"><table><thead><tr><th>Курсант A</th><th>Курсант B</th><th>Совпадение</th><th>Баллы (A / B)</th><th></th></tr></thead><tbody>';
    plagiarismPairs.forEach(p => {
      const sa = p.a.report?.meta?.score, sb = p.b.report?.meta?.score;
      const simClass = p.sim >= 0.95 ? 'red' : p.sim >= 0.85 ? 'orange' : '';
      html += `<tr>
        <td style="font-weight:600;color: var(--ink-strong)">${p.a.report?.meta?.fio ?? p.a.fileName}</td>
        <td style="font-weight:600;color: var(--ink-strong)">${p.b.report?.meta?.fio ?? p.b.fileName}</td>
        <td class="${simClass}"><b>${Math.round(p.sim * 100)}%</b></td>
        <td>${sa ?? '—'} / ${sb ?? '—'}</td>
        <td>
          <button class="copy-btn" style="width:auto;padding:0 10px;height:28px;font-size:10px;font-weight:700;margin-right:6px" onclick="showBatchDetail(${p.a._i})">A</button>
          <button class="copy-btn" style="width:auto;padding:0 10px;height:28px;font-size:10px;font-weight:700" onclick="showBatchDetail(${p.b._i})">B</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }
  html += `</div>`;

  /* — СОВПАДЕНИЯ УСТРОЙСТВ («кто чьим устройством пользовался») — */
  html += `
    <div class="glass-card">
      <h3>🖥️ Совпадения устройств</h3>
      <p style="margin-bottom:14px">Сопоставление device fingerprint (canvas/audio/WebGL-хэш) и Visitor ID между отчётами. Совпадение означает, что отчёты сформированы <b>с одного и того же физического устройства/браузерного профиля</b> — либо один курсант выполнял работу за другого, либо один человек отправил несколько отчётов под разными именами.</p>`;
  if (deviceCollisions.length === 0) {
    html += `<p class="green">✅ Совпадений устройств между разными курсантами не обнаружено</p>`;
  } else {
    deviceCollisions.forEach(group => {
      const names = group.members.map(m => m.report?.meta?.fio ?? m.fileName);
      html += `
        <div style="border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.06);border-radius:var(--radius-md);padding:14px 18px;margin-bottom:12px">
          <div style="margin-bottom:8px"><span class="badge badge-danger">${group.matchType}</span></div>
          <div style="display:flex;flex-wrap:wrap;gap:10px">
            ${group.members.map(m => `
              <button class="copy-btn" style="width:auto;padding:0 14px;height:32px;font-size:12px;font-weight:700" onclick="showBatchDetail(${m._i})">
                ${m.report?.meta?.fio ?? m.fileName}
              </button>`).join('')}
          </div>
        </div>`;
    });
  }
  html += `</div>`;

  /* — ТЕПЛОВАЯ КАРТА ВРЕМЕНИ ПО ЗАДАНИЯМ — */
  html += `
    <div class="glass-card">
      <h3>🌡️ Тепловая карта времени по заданиям</h3>
      ${buildTimeHeatmapHtml(ok)}
    </div>`;

  /* — ТАБЛИЦА ПО КУРСАНТАМ (сортируемая) — */
  html += `
    <div class="glass-card">
      <div class="result-header" style="margin-bottom:16px">
        <h3 style="margin-bottom:0">🗂️ Сводная таблица (${results.length})</h3>
        <button class="btn btn-success-neo" style="padding:10px 20px;font-size:13px" onclick="downloadBatchCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Скачать сводный CSV
        </button>
      </div>
      <p style="margin:-6px 0 14px;font-size:12px;color:var(--ink-muted)">💡 Кликните по заголовку колонки, чтобы отсортировать</p>
      <div class="table-wrap"><table>
        <thead id="batchTableHead"><tr>
          <th data-sort="n" onclick="sortBatchTable('n')" style="cursor:pointer">#</th>
          <th>Файл</th>
          <th data-sort="fio" onclick="sortBatchTable('fio')" style="cursor:pointer">ФИО</th>
          <th>Группа</th><th>Задание</th>
          <th data-sort="score" onclick="sortBatchTable('score')" style="cursor:pointer">Балл</th>
          <th>Оценка</th>
          <th data-sort="risk" onclick="sortBatchTable('risk')" style="cursor:pointer">Риск-балл</th>
          <th data-sort="integrity" onclick="sortBatchTable('integrity')" style="cursor:pointer">Целостность</th>
          <th></th>
        </tr></thead>
        <tbody id="batchTableBody"></tbody>
      </table></div>
    </div>`;

  batchTableRows = withIdx.map((r, n) => {
    if (r.error) {
      return {
        sortVals: { n: n, fio: r.fileName, score: -1, risk: -1, integrity: 0 },
        rowHtml: `<tr>
          <td>${n + 1}</td>
          <td style="max-width:200px;overflow-wrap:break-word">${r.fileName}</td>
          <td colspan="6"><span class="badge badge-danger">Ошибка разбора</span> ${r.error}</td>
          <td>—</td>
        </tr>`
      };
    }
    const meta = r.report?.meta ?? {};
    const sv = meta.score;
    const maxSv = meta.max_score ?? 16;
    const grade = (sv === null || sv === undefined) ? null : gradeInfo(sv, maxSv).num;
    const riskBadge = r.riskAnalysis.level === 'high' ? 'badge-danger' : r.riskAnalysis.level === 'medium' ? 'badge-warn' : 'badge-ok';
    const riskLabel = r.riskAnalysis.level === 'high' ? 'Высокий' : r.riskAnalysis.level === 'medium' ? 'Средний' : 'Низкий';
    return {
      sortVals: { n: n, fio: (meta.fio ?? '').toLowerCase(), score: sv ?? -1, risk: r.riskAnalysis.score, integrity: r.chainCheck.ok ? 1 : 0 },
      rowHtml: `<tr>
        <td>${n + 1}</td>
        <td style="max-width:180px;overflow-wrap:break-word;font-size:11px;color:var(--ink-muted)">${r.fileName}</td>
        <td style="font-weight:600;color: var(--ink-strong)">${meta.fio ?? '—'}</td>
        <td><span class="badge-grp">${meta.group ?? '—'}</span></td>
        <td>${meta.task ?? '—'}</td>
        <td>${sv !== null && sv !== undefined ? sv + ' / ' + maxSv : '—'}</td>
        <td>${grade ? `<span class="grade-badge grade-${grade}">${grade}</span>` : '<span class="empty-state" style="padding:0">—</span>'}</td>
        <td><span class="badge ${riskBadge}">${riskLabel}</span> <b style="color:var(--ink-muted);font-size:11px">${r.riskAnalysis.score}</b></td>
        <td>${r.chainCheck.ok ? '<span class="green">✅ OK</span>' : '<span class="red">❌ нарушена</span>'}</td>
        <td><button class="copy-btn" style="width:auto;padding:0 12px;height:32px;font-size:11px;font-weight:700" onclick="showBatchDetail(${r._i})">Подробно</button></td>
      </tr>`
    };
  });


  batchSortState = { key: null, dir: 1 };
  document.getElementById('batchDashboard').innerHTML = html;
  renderBatchTableBody();
  document.getElementById('batchDashboard').style.display = 'block';
  document.getElementById('batchDashboard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* Открыть детальный отчёт по конкретному курсанту из пакетной таблицы */
function showBatchDetail(i) {
  const r = batchResults[i];
  if (!r || r.error) { alert('❌ Этот файл не удалось разобрать: ' + (r?.error ?? 'неизвестная ошибка')); return; }
  renderSingleReport(r.report, r.chainCheck, r.riskAnalysis);
  const resEl = document.getElementById('verifyResult');
  resEl.style.display = 'block';
  resEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* Скачать сводный CSV по всей пачке отчётов */
function downloadBatchCSV() {
  const rows = ['Файл;ФИО;Группа;Задание;Балл;Максимум;Оценка;Риск;Риск_балл;Длительность_мин;Кол-во_рисков;Целостность_цепочки;Device_ID'];
  batchResults.forEach(r => {
    if (r.error) { rows.push(`${r.fileName};ОШИБКА;;;;;;;;;;;${r.error}`); return; }
    const meta = r.report?.meta ?? {};
    const sv = meta.score;
    const maxSv = meta.max_score ?? 16;
    const grade = (sv === null || sv === undefined) ? '—' : gradeInfo(sv, maxSv).num;
    rows.push(`${r.fileName};${meta.fio ?? '—'};${meta.group ?? '—'};${meta.task ?? '—'};${sv ?? '—'};${maxSv};${grade};${r.riskAnalysis.level};${r.riskAnalysis.score};${r.riskAnalysis.durationMin || ''};${r.riskAnalysis.risks.length};${r.chainCheck.ok ? 'OK' : 'НАРУШЕНА'};${r.report?.fingerprint?.deviceID ?? ''}`);
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Сводка_пакетной_проверки_${new Date().toLocaleDateString('ru-RU')}.csv`;
  a.click();
}

/* ── АВТОЗАГРУЗКА ОТЧЁТА ИЗ URL (#r=...) ──
   Срабатывает, если открыть эту страницу по ссылке из QR-кода ЭЦП-отчёта
   (когда в База.html настроен VERIFIER_URL). Переключает на вкладку
   «Проверка отчётов» и сразу запускает анализ. */
(function autoLoadReportFromHash() {
  const hash = window.location.hash;
  if (!hash || !hash.startsWith('#r=')) return;
  const b64 = hash.slice(3);
  if (!b64) return;

  window.addEventListener('DOMContentLoaded', () => {
    try {
      document.getElementById('raw').value = 'PZ-REPORT::' + b64 + '::END';
      switchTab('tab-verify', document.getElementById('tabBtnVerify'));
      decodeReport(document.getElementById('btnDecode'));
    } catch (e) {
      console.warn('Не удалось автоматически загрузить отчёт из ссылки:', e);
    }
  });
})();

/* ── INTERSECTION OBSERVER (wow animations) ── */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.animationPlayState = 'running';
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.glass-card').forEach(el => observer.observe(el));
</script>
</body>
</html>
